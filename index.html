<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BusRouteWidget">
  <title>BusRouteWidget</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.svg">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>BusRouteWidget</h1>
      <button id="refresh-all-button" class="button">Update all</button>
    </header>

    <section id="routes-list" class="routes-list"></section>
  </main>

  <template id="route-row-template">
    <article class="route-row">
      <div class="route-meta">
        <h2 class="route-title"></h2>
        <p class="route-duration">--</p>
      </div>
      <button class="button route-refresh-button" type="button">Update</button>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
